name: Build SeedRoller UI

on:
  push:
    branches: [ main, master ]
    paths:
      - "src/**"
      - "game_libs/**"
      - ".github/workflows/ui-build.yml"
      - "README.md"
  pull_request:
    branches: [ main, master ]

jobs:
  build-ui:
    runs-on: windows-latest
    env:
      GAME_DATA_PATH: ${{ github.workspace }}\game_libs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure game libs exist
        shell: pwsh
        run: |
          if (-not (Test-Path $env:GAME_DATA_PATH)) {
            Write-Error "game_libs 目录不存在，请确认仓库已包含 sts2.dll/0Harmony.dll。"
          }
          foreach ($dll in 'sts2.dll','0Harmony.dll') {
            $full = Join-Path $env:GAME_DATA_PATH $dll
            if (-not (Test-Path $full)) { Write-Error "缺少 $dll" }
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore UI
        shell: pwsh
        run: dotnet restore src/SeedRollerUI/SeedRollerUI.csproj /p:GameDataPath="$env:GAME_DATA_PATH"

      - name: Restore CLI
        shell: pwsh
        run: dotnet restore src/SeedRollerCli/SeedRollerCli.csproj /p:GameDataPath="$env:GAME_DATA_PATH"

      - name: Build UI
        shell: pwsh
        run: dotnet build src/SeedRollerUI/SeedRollerUI.csproj -c Release --no-restore /p:GameDataPath="$env:GAME_DATA_PATH"

      - name: Build CLI
        shell: pwsh
        run: dotnet build src/SeedRollerCli/SeedRollerCli.csproj -c Release --no-restore /p:GameDataPath="$env:GAME_DATA_PATH"

      - name: Publish UI
        shell: pwsh
        run: |
          dotnet publish src/SeedRollerUI/SeedRollerUI.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:GameDataPath="$env:GAME_DATA_PATH" `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Publish CLI
        shell: pwsh
        run: |
          dotnet publish src/SeedRollerCli/SeedRollerCli.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:GameDataPath="$env:GAME_DATA_PATH" `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Package artifact
        id: package
        shell: pwsh
        run: |
          $uiPublish = Join-Path $env:GITHUB_WORKSPACE 'src/SeedRollerUI/bin/Release/net9.0-windows/win-x64/publish'
          $cliPublish = Join-Path $env:GITHUB_WORKSPACE 'src/SeedRollerCli/bin/Release/net9.0/win-x64/publish'
          if (-not (Test-Path $uiPublish)) { Write-Error "发布目录不存在: $uiPublish" }
          if (-not (Test-Path $cliPublish)) { Write-Error "CLI 发布目录不存在: $cliPublish" }
          $seedInfoSrc = Join-Path $env:GITHUB_WORKSPACE 'src/SeedRollerUI/seed_info.json'
          if (Test-Path $seedInfoSrc) {
            Copy-Item $seedInfoSrc (Join-Path $uiPublish 'seed_info.json') -Force
          }
          $cliTarget = Join-Path $uiPublish 'cli'
          if (Test-Path $cliTarget) { Remove-Item $cliTarget -Recurse -Force }
          Copy-Item $cliPublish $cliTarget -Recurse -Force
          $gameLibsSrc = Join-Path $env:GITHUB_WORKSPACE 'game_libs'
          if (Test-Path $gameLibsSrc) {
            $gameLibsDest = Join-Path $uiPublish 'game_libs'
            if (Test-Path $gameLibsDest) { Remove-Item $gameLibsDest -Recurse -Force }
            Copy-Item $gameLibsSrc $gameLibsDest -Recurse -Force
          }
          $packageRoot = Join-Path $env:GITHUB_WORKSPACE 'seedroller-ui-package'
          if (Test-Path $packageRoot) { Remove-Item $packageRoot -Recurse -Force }
          $uiDest = Join-Path $packageRoot 'SeedRollerUI'
          New-Item -ItemType Directory -Path $uiDest -Force | Out-Null
          Copy-Item -Path (Join-Path $uiPublish '*') -Destination $uiDest -Recurse -Force
          $seedInfoInside = Join-Path $uiDest 'seed_info.json'
          if (Test-Path $seedInfoInside) {
            Copy-Item $seedInfoInside (Join-Path $packageRoot 'seed_info.json') -Force
          }
          $shortcutPath = Join-Path $packageRoot 'SeedRollerUI.lnk'
          $shell = New-Object -ComObject WScript.Shell
          $shortcut = $shell.CreateShortcut($shortcutPath)
          $shortcut.TargetPath = Join-Path $uiDest 'SeedRollerUI.exe'
          $shortcut.WorkingDirectory = $uiDest
          $shortcut.IconLocation = $shortcut.TargetPath
          $shortcut.Save()
          $zipPath = Join-Path $env:GITHUB_WORKSPACE 'seedroller-ui-win-x64.zip'
          Compress-Archive -Path (Join-Path $packageRoot '*') -DestinationPath $zipPath -Force
          "artifactPath=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seedroller-ui-win-x64
          path: ${{ steps.package.outputs.artifactPath }}
